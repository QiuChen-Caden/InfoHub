# InfoHub 私有化部署模板 — 单租户一键部署
version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: infohub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-infohub_secret}
      POSTGRES_DB: infohub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "infohub"]
      interval: 10s
      start_period: 30s

  postgres-miniflux:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: miniflux
      POSTGRES_PASSWORD: ${MINIFLUX_DB_PASSWORD:-miniflux_secret}
      POSTGRES_DB: miniflux
    volumes:
      - postgres_miniflux_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "miniflux"]
      interval: 10s
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  rsshub:
    image: diygod/rsshub:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CACHE_TYPE: redis
      CACHE_EXPIRE: 1800
      REDIS_URL: "redis://redis:6379/"
    depends_on:
      - redis

  miniflux:
    image: miniflux/miniflux:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://miniflux:${MINIFLUX_DB_PASSWORD:-miniflux_secret}@postgres-miniflux/miniflux?sslmode=disable"
      RUN_MIGRATIONS: 1
      CREATE_ADMIN: 1
      ADMIN_USERNAME: ${MINIFLUX_ADMIN:-admin}
      ADMIN_PASSWORD: ${MINIFLUX_PASSWORD:-changeme123}
      POLLING_FREQUENCY: 30
      FETCH_ALLOW_PRIVATE_NETWORKS: 1
      FETCHER_ALLOW_PRIVATE_NETWORKS: 1
    depends_on:
      postgres-miniflux:
        condition: service_healthy

  # 单租户模式：API + Worker 合一
  infohub:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_MODE: api
      DATABASE_URL: "postgresql+asyncpg://infohub:${POSTGRES_PASSWORD:-infohub_secret}@postgres:5432/infohub"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET: ${JWT_SECRET:-change-me}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      MINIFLUX_URL: "http://miniflux:8080"
      MINIFLUX_ADMIN: ${MINIFLUX_ADMIN:-admin}
      MINIFLUX_PASSWORD: ${MINIFLUX_PASSWORD:-changeme123}
      RSSHUB_URL: "http://rsshub:1200"
      OUTPUT_DIR: /app/output
      # 私有化引导：首次启动自动从 YAML 创建租户
      BOOTSTRAP_EMAIL: ${BOOTSTRAP_EMAIL:-}
      BOOTSTRAP_PASSWORD: ${BOOTSTRAP_PASSWORD:-}
    volumes:
      - ./config:/app/config:ro
      - ./output:/app/output
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_MODE: worker
      DATABASE_URL: "postgresql+asyncpg://infohub:${POSTGRES_PASSWORD:-infohub_secret}@postgres:5432/infohub"
      REDIS_URL: "redis://redis:6379/0"
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      MINIFLUX_URL: "http://miniflux:8080"
      MINIFLUX_ADMIN: ${MINIFLUX_ADMIN:-admin}
      MINIFLUX_PASSWORD: ${MINIFLUX_PASSWORD:-changeme123}
      RSSHUB_URL: "http://rsshub:1200"
      OUTPUT_DIR: /app/output
    volumes:
      - ./output:/app/output
    depends_on:
      postgres:
        condition: service_healthy

  beat:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_MODE: beat
      DATABASE_URL: "postgresql+asyncpg://infohub:${POSTGRES_PASSWORD:-infohub_secret}@postgres:5432/infohub"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  postgres_miniflux_data:
  redis_data:
