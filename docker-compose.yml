version: "3.8"

services:
  # ---- 数据库 ----
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: miniflux
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: miniflux
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-infohub.sh:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "miniflux"]
      interval: 10s
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 128M

  # ---- 数据源层 ----
  rsshub:
    image: diygod/rsshub:latest
    restart: unless-stopped
    ports:
      - "1920:1200"
    environment:
      NODE_ENV: production
      CACHE_TYPE: redis
      CACHE_EXPIRE: 1800
      CACHE_CONTENT_EXPIRE: 7200
      REDIS_URL: "redis://redis:6379/"
      REQUEST_RETRY: 3
      REQUEST_TIMEOUT: 10000
      DEBUG_INFO: "true"
      # 中文平台 Cookie（按需填写）
      # BILIBILI_COOKIE_UID: ""
      # WEIBO_COOKIES: ""
      # ZHIHU_COOKIES: ""
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 1024M

  # ---- 聚合层 ----
  miniflux:
    image: miniflux/miniflux:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://miniflux:${POSTGRES_PASSWORD}@postgres/miniflux?sslmode=disable"
      RUN_MIGRATIONS: 1
      CREATE_ADMIN: 1
      ADMIN_USERNAME: ${MINIFLUX_ADMIN}
      ADMIN_PASSWORD: ${MINIFLUX_PASSWORD}
      POLLING_FREQUENCY: 30
      BATCH_SIZE: 50
      WORKER_POOL_SIZE: 8
      CLEANUP_ARCHIVE_READ_DAYS: 30
      CLEANUP_ARCHIVE_UNREAD_DAYS: 90
      FETCH_ALLOW_PRIVATE_NETWORKS: 1
      FETCHER_ALLOW_PRIVATE_NETWORKS: 1
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "miniflux", "-healthcheck", "auto"]
      interval: 10s
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M

  # ---- 编排层 ----
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_MODE: cron
      DATABASE_URL: "postgresql://infohub:${INFOHUB_DB_PASSWORD}@postgres:5432/infohub"
      MINIFLUX_URL: "http://miniflux:8080"
      MINIFLUX_API_KEY: ${MINIFLUX_API_KEY}
      RSSHUB_URL: "http://rsshub:1200"
      AI_API_KEY: ${AI_API_KEY}
      AI_MODEL: ${AI_MODEL:-deepseek/deepseek-chat}
      AI_API_BASE: ${AI_API_BASE:-}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-*/30 * * * *}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      DINGTALK_WEBHOOK_URL: ${DINGTALK_WEBHOOK_URL:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_TO: ${EMAIL_TO:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      OBSIDIAN_VAULT_PATH: /obsidian
    volumes:
      - ./config:/app/config:ro
      - ./output:/app/output
      - ${OBSIDIAN_VAULT_PATH:-./obsidian_output}:/obsidian
    depends_on:
      postgres:
        condition: service_healthy
      miniflux:
        condition: service_healthy
      rsshub:
        condition: service_started

  # ---- API 层 ----
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_MODE: api
      DATABASE_URL: "postgresql://infohub:${INFOHUB_DB_PASSWORD}@postgres:5432/infohub"
      CONFIG_DIR: /app/config
      MINIFLUX_URL: "http://miniflux:8080"
      MINIFLUX_API_KEY: ${MINIFLUX_API_KEY}
      RSSHUB_URL: "http://rsshub:1200"
      AI_API_KEY: ${AI_API_KEY}
      AI_MODEL: ${AI_MODEL:-deepseek/deepseek-chat}
      AI_API_BASE: ${AI_API_BASE:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      DINGTALK_WEBHOOK_URL: ${DINGTALK_WEBHOOK_URL:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_TO: ${EMAIL_TO:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      OBSIDIAN_VAULT_PATH: /obsidian
    volumes:
      - ./config:/app/config:ro
      - ./output:/app/output
      - ${OBSIDIAN_VAULT_PATH:-./obsidian_output}:/obsidian
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
